# workflow to produce the VS code extension

name: Build VS Code extension

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:  # Can be triggered manually

env:
  NODEJS_VERSION: '22.22.2'

jobs:

  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{env.NODEJS_VERSION}}'

      - name: Install vsce to package code
        run: |
          npm install -g @vscode/vsce

      - name: Package extension as VSIX artefact
        run: |
          npm install
          npm run clean
          npm run langium:generate
          npm run build
          cd packages/extension
          vsce package -o jpipe-extension.vsix

      - name: Upload VSIX artefact
        uses: actions/upload-artifact@v7
        with:
          name: jpipe-extension-${{ github.sha }}.vsix
          path: packages/extension/jpipe-extension.vsix
          archive: false
